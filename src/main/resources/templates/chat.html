{#include base.html}

    {#body}

        <h1>💬 Chat Memory</h1>

        <div class="card">
            <table class="data-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Memory ID</th>
                    <th>Conversation</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                {#for session in chatSessions}
                    <tr>
                        <td class="muted">{session_index + 1}</td>
                        <td class="text-mono truncate">
                            <a href="{base}/{session.encodedMemoryId}">{session.memoryId}</a>
                        </td>
                        <td>
                            <div style="max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.45rem; padding-right: 0.3rem;">
                                {#for message in session.messages}
                                    <div style="border-radius: 8px; padding: 0.45rem 0.6rem; max-width: 100%; {#if message.role == 'user'}background:#dbeafe;border:1px solid #bfdbfe;{#else if message.role == 'ai'}background:#dcfce7;border:1px solid #bbf7d0;{#else if message.role == 'tool'}background:#f3e8ff;border:1px solid #e9d5ff;{#else if message.role == 'error'}background:#fee2e2;border:1px solid #fecaca;{#else}background:#f3f4f6;border:1px solid #e5e7eb;{/if}">
                                        <div style="font-size:0.68rem; text-transform: uppercase; letter-spacing:0.04em; font-weight:600; color:#6b7280; margin-bottom:0.2rem;">
                                            {message.role}
                                        </div>
                                        <div style="white-space: pre-wrap; word-break: break-word;">{message.text}</div>
                                    </div>
                                {/for}
                            </div>
                        </td>
                        <td style="white-space:nowrap">
                            <form action="{base}/{session.encodedMemoryId}/delete" method="post" style="display:inline">
                                <button class="btn btn-danger" type="submit"
                                        onclick="return confirm('Delete this chat memory entry?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                {/for}
                </tbody>
            </table>
        </div>

    {/body}

{/include}
