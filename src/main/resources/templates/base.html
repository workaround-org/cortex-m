<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex-M</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --sidebar-bg: #111827;
            --sidebar-hover: #1f2937;
            --sidebar-active: #6366f1;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text: #111827;
            --text-muted: #6b7280;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.9rem;
            display: grid;
            height: 100vh;
            grid-template-columns: 220px 1fr;
            grid-template-rows: 56px 1fr;
            grid-template-areas:
                "sidebar header"
                "sidebar content";
            color: var(--text);
        }

        header {
            grid-area: header;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            font-weight: 600;
            font-size: 1rem;
            gap: 0.5rem;
        }

        aside {
            grid-area: sidebar;
            background: var(--sidebar-bg);
            color: #d1d5db;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 1rem 1.25rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            border-bottom: 1px solid #1f2937;
        }

        .sidebar-brand span { color: var(--accent); }

        nav a {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.65rem 1.25rem;
            color: #9ca3af;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            border-left: 3px solid transparent;
        }

        nav a:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }

        nav a.active {
            background: var(--sidebar-hover);
            color: #fff;
            border-left-color: var(--accent);
        }

        nav .nav-section {
            padding: 1.25rem 1.25rem 0.4rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #4b5563;
        }

        main {
            grid-area: content;
            padding: 2rem;
            overflow-y: auto;
            background: var(--bg);
        }

        h1 {
            font-size: 1.4rem;
            margin: 0 0 1.25rem;
            color: var(--text);
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        button, .btn {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-ghost:hover { background: var(--border); }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
        }

        .data-table th {
            position: sticky;
            top: 0;
            background: #f9fafb;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .data-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        .data-table tbody tr:last-child td { border-bottom: none; }

        .data-table tbody tr:hover { background: #f9fafb; }

        .data-table td.muted { color: var(--text-muted); font-size: 0.8rem; }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-purple { background: #ede9fe; color: #6d28d9; }
        .badge-blue   { background: #dbeafe; color: #1d4ed8; }
        .badge-green  { background: #dcfce7; color: #15803d; }
        .badge-amber  { background: #fef3c7; color: #b45309; }

        .text-mono {
            font-family: ui-monospace, monospace;
            font-size: 0.82rem;
        }

        .truncate {
            max-width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Dialog / Modal */
        dialog {
            border: none;
            border-radius: 12px;
            padding: 0;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        dialog::backdrop { background: rgba(0,0,0,0.45); }

        .dialog-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 1rem;
            font-weight: 600;
        }

        .dialog-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .dialog-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type=text], input[type=url], input[type=datetime-local], select, textarea {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.7rem;
            font-size: 0.88rem;
            font-family: inherit;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.15s;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        textarea { resize: vertical; min-height: 100px; }
    </style>
</head>
<body>

<header>
    🧠 Cortex-M
</header>

<aside>
    <div class="sidebar-brand">⚡ <span>cortex</span>-m</div>
    <nav>
        <div class="nav-section">Settings</div>
        <a href="/api/cortex-m/v1/dashboard/mcp-configs">MCP Connections</a>
        <a href="/api/cortex-m/v1/dashboard/souls">Soul</a>
        <a href="/api/cortex-m/v1/dashboard/tasks">Scheduled Tasks</a>
    </nav>
</aside>

<main>
    {#insert body /}
</main>

</body>
</html>
